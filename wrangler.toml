name = "status-page-cf"
#main = "index.js"
type = "webpack"
webpack_config = "node_modules/flareact/webpack"
workers_dev = true
account_id = "adb055aaf8325420af12ab37aef224ab"
compatibility_date = "2025-05-20"
compatibility_flags = [ "nodejs_compat" ]

[triggers]
crons = ["*/30 * * * *"]

#[site]
bucket = "out"
entry-point = "./"

# uncomment and adjust following if you are not using GitHub Actions
[env.production]
name = "websites"
kv-namespaces = [{binding="KV_STATUS_PAGE", id="3de7706b702349fc9d0628752a3add4c"}]
route="websites.dominioweb.com.mx/*"